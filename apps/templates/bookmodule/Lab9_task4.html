<h2>Task 4: Price Statistics per Publisher</h2>
<table border="1">
    <tr>
        <th>Publisher</th>
        <th>Avg Price</th>
        <th>Min Price</th>
        <th>Max Price</th>
    </tr>
    {% for pub in publishers %}
    <tr>
        <td>{{ pub.name }}</td>
        <td>{{ pub.avg_price|default:"0" }}</td>
        <td>{{ pub.min_price|default:"0" }}</td>
        <td>{{ pub.max_price|default:"0" }}</td>
    </tr>
    {% endfor %}
</table>
