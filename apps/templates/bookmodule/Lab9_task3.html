<h2>Task 3: Oldest Book per Publisher</h2>
<table border="1">
    <tr>
        <th>Publisher Name</th>
        <th>Oldest Publication Date</th>
    </tr>
    {% for pub in publishers %}
    <tr>
        <td>{{ pub.name }}</td>
        <td>{{ pub.oldest_book_date|date:"Y-m-d" }}</td>
    </tr>
    {% endfor %}
</table>
